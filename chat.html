<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Betty — ABC Peinture Déco</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, 'DM Sans', Arial, sans-serif;
    background: transparent;
  }

  .chat {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #0f172a;
    border-radius: 16px;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: #0b1220;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .header img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
  }

  .header-text {
    display: flex;
    flex-direction: column;
  }

  .header-text strong {
    font-size: 14px;
    color: white;
  }

  .header-text span {
    font-size: 12px;
    color: #9ca3af;
  }

  .header-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,.5);
    margin-left: auto;
    flex-shrink: 0;
  }

  /* MESSAGES */
  .messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 82%;
    line-height: 1.5;
    font-size: 14px;
    word-break: break-word;
  }

  .bot {
    background: #1e293b;
    color: white;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
  }

  .user {
    background: #d2a86f;
    color: #1a1410;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    font-weight: 500;
  }

  /* TYPING INDICATOR */
  .typing {
    background: #1e293b;
    padding: 12px 16px;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    display: none;
  }

  .typing.visible {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #9ca3af;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* INPUT */
  .input-box {
    display: flex;
    padding: 10px;
    background: #0b1220;
    border-top: 1px solid rgba(255,255,255,0.08);
    gap: 8px;
    flex-shrink: 0;
  }

  input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    outline: none;
    font-size: 14px;
    background: #1e293b;
    color: white;
    transition: border-color .2s;
  }

  input::placeholder { color: #6b7280; }
  input:focus { border-color: rgba(210,168,111,0.5); }

  input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  button {
    padding: 10px 16px;
    border: none;
    background: linear-gradient(135deg, #d4af74 0%, #a87d44 100%);
    color: #1c1204;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    transition: opacity .2s, transform .15s;
    flex-shrink: 0;
  }

  button:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
</style>
</head>

<body>
<div class="chat">

  <!-- HEADER -->
  <div class="header">
    <img src="/static/avatar.png" alt="Betty">
    <div class="header-text">
      <strong>Betty</strong>
      <span>Devis peinture rapide</span>
    </div>
    <div class="header-dot"></div>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="messages">
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-box">
    <input id="input" placeholder="Répondez à Betty…" autocomplete="off">
    <button id="send-btn" onclick="sendMessage()">Envoyer</button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");
  const typingEl   = document.getElementById("typing");

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    // Liens cliquables
    div.innerHTML = text.replace(
      /(https?:\/\/[^\s<]+)/g,
      '<a href="$1" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:underline">$1</a>'
    );
    // Insérer avant l'indicateur de frappe
    messagesEl.insertBefore(div, typingEl);
    scrollBottom();
  }

  function setLoading(isLoading) {
    inputEl.disabled  = isLoading;
    sendBtn.disabled  = isLoading;
    typingEl.className = isLoading ? "typing visible" : "typing";
    scrollBottom();
  }

  async function sendMessage() {
    const msg = inputEl.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    inputEl.value = "";
    setLoading(true);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      addMessage(data.response || "Pas de réponse", "bot");
    } catch (e) {
      addMessage("Une erreur s'est glissée… Appelez-nous au 02 43 75 98 18 !", "bot");
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  // Envoi avec Entrée
  inputEl.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
  });

  // Message d'accueil initial de Betty
  addMessage(
    "Bonjour ! Je suis Betty 👋 l'assistante d'ABC Peinture Déco.<br>Pour préparer votre devis, quel type de travaux souhaitez-vous réaliser ?",
    "bot"
  );
</script>
</body>
</html>
