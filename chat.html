<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Betty — ABC Peinture Déco</title>

  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: #0b1220;
      color: white;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      background: linear-gradient(90deg, #2d5bff, #3b82f6);
      padding: 16px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      margin-bottom: 15px;
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.4;
    }

    .bot {
      background: #111827;
      border: 1px solid #1f2937;
    }

    .user {
      background: #2d5bff;
      align-self: flex-end;
    }

    .input-box {
      display: flex;
      padding: 15px;
      border-top: 1px solid #1f2937;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      background: #2d5bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1e40af;
    }
  </style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    <img src="/static/avatar.jpg" alt="Betty">
    Betty — Devis peinture rapide
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-box">
    <input id="input" placeholder="Ex : Je veux repeindre mon salon">
    <button onclick="sendMessage()">Envoyer</button>
  </div>

</div>

<script>
  const messages = document.getElementById("messages");
  const input = document.getElementById("input");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;

    div.innerHTML = text.replace(
      /(https?:\/\/[^\s]+)/g,
      '<a href="$1" target="_blank" style="color:#60a5fa">$1</a>'
    );

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function addUserMessage(text) {
    addMessage(text, "user");
  }

  function addBotMessage(text) {
    addMessage(text, "bot");
  }

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addUserMessage(message);
    input.value = "";

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      if (!res.ok) throw new Error("Erreur API");

      const data = await res.json();
      addBotMessage(data.response || "Réponse vide.");

    } catch (err) {
      console.error(err);
      addBotMessage("Un souci technique est survenu. Réessayez dans quelques secondes.");
    }
  }

  // ENTER pour envoyer
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });

  // Message initial
  addBotMessage("Bonjour, je suis Betty. Je peux vous aider à qualifier votre projet peinture et préparer un devis.");

</script>

</body>
</html>
