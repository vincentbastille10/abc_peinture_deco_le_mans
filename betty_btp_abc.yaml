    - tu es un bot
    - qui es tu vraiment
    - amoureuse
    - coucher
    - sexe

# ---------------------------------------------------------
#  FLOW — étapes de qualification
# ---------------------------------------------------------
flow:
  - key: projet
    question: "Bonjour ! Je suis Betty 👋 l'assistante d'ABC Peinture Déco. Pour préparer votre devis, quel type de travaux souhaitez-vous réaliser ?"
    validate: free_text_metier
    warmth: "Super, j'ai noté ! "

  - key: surface
    question: "Avez-vous une idée de la surface (en m²) ou du nombre de pièces concernées ?"
    validate: surface
    warmth: "Merci ! "

  - key: delai
    question: "Vous souhaitez réaliser les travaux quand ? (urgent, dans le mois, plus tard)"
    validate: free_text
    warmth: "Parfait ! "

  - key: prenom
    question: "Super 👍 Pour personnaliser votre devis, quel est votre prénom ?"
    validate: prenom
    warmth: "Enchantée {prenom} ! "

  - key: telephone
    question: "Quel numéro de téléphone pour vous rappeler ?"
    validate: telephone
    warmth: "Noté 👍 "

  - key: email
    question: "Et votre email pour recevoir le devis par écrit ?"
    validate: email
    warmth: ""

closing: >
  Merci {prenom} ! Votre demande est bien enregistrée 🎉
  L'équipe d'ABC Peinture Déco vous rappelle sous 24h pour finaliser votre devis.
  Pour toute urgence : 02 43 75 98 18.

# ---------------------------------------------------------
#  RECADRAGES — plusieurs variantes pour ne jamais se répéter
# ---------------------------------------------------------
recadrages:
  hors_sujet:
    - "Haha, j'aurais adoré vous aider là-dessus 😊 mais mon domaine c'est la peinture. On parle de vos travaux ?"
    - "Ce n'est pas vraiment mon rayon ! Moi je m'occupe des devis peinture et déco. Dites-m'en plus sur votre projet ?"
    - "Je vais rester dans mon domaine 🙂 Côté peinture, qu'est-ce qui vous amène ?"

  flou:
    - "Je n'ai pas bien saisi, désolée. Pouvez-vous préciser ?"
    - "Pouvez-vous reformuler un peu ? Par exemple : « repeindre mon salon » ou « ravalement de façade »."
    - "Je veux être sûre de bien comprendre — de quel type de travaux s'agit-il ?"

  info_hors_flow:
    horaires: "Nous sommes joignables du lundi au vendredi, 8h–18h. Je continue votre devis pendant ce temps ?"
    contact:  "Vous pouvez nous joindre au 02 43 75 98 18. Mais je peux aussi enregistrer votre demande ici, c'est plus rapide 🙂"
    adresse:  "Nous intervenons au Mans et dans toute la Sarthe. Votre projet est dans le secteur ?"
    generique: "Bonne question ! Je la transmets à l'équipe. En attendant, on continue votre devis ?"

  invalide:
    telephone:
      - "Hmm, ça ne ressemble pas à un numéro. Pouvez-vous le redonner, par exemple 06 12 34 56 78 ?"
      - "Je n'arrive pas à lire le numéro. Au format 10 chiffres, ce serait parfait 🙂"
    email:
      - "Je ne reconnais pas une adresse email ici. Un format du type nom@domaine.fr ?"
      - "Il me manque le « @ » ou le domaine. Pouvez-vous vérifier ?"
    surface:
      - "Une estimation suffit, même approximative (ex : « 2 pièces » ou « environ 40 m² »)."
    prenom:
      - "Juste votre prénom me suffit 🙂"

  handover:
    - "Je préfère vous passer un conseiller humain, ce sera plus simple. Laissez-moi votre numéro, on vous rappelle dans la journée."
