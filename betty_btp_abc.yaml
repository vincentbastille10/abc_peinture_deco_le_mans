# =========================================================
#  Betty — ABC Peinture Déco (Le Mans, Sarthe)
#  Flow conversationnel + lexique + recadrages.
#  Ce fichier est désormais VRAIMENT chargé par api/main.py.
# =========================================================

identity:
  name: "Betty"
  company: "ABC Peinture Déco"
  phone: "02 43 75 98 18"
  location: "Le Mans, Sarthe"

behavior:
  tone: "humain, pro, chaleureux, jamais robotique"
  max_sentences: 2
  max_off_topic_before_handover: 2

# ---------------------------------------------------------
#  LEXIQUE — permet à classify_message() de catégoriser
# ---------------------------------------------------------
lexique:
  metier:
    - peinture
    - peindre
    - repeindre
    - peintre
    - mur
    - murs
    - plafond
    - facade
    - crepi
    - enduit
    - papier peint
    - tapisserie
    - decoration
    - deco
    - ravalement
    - lessivage
    - renovation
    - travaux
    - chantier
    - devis
    - prix
    - tarif
    - estimation
    - interieur
    - exterieur
    - piece
    - salon
    - chambre
    - cuisine
    - salle de bain
    - couloir
    - entree
    - maison
    - appartement
    - bureau
    - local
    - commerce
    - boutique

  info_hors_flow:
    - horaires
    - ouvert
    - ferme
    - adresse
    - ou etes vous
    - contact
    - rappel
    - urgent
    - intervenez vous
    - zone
    - secteur
    - garantie
    - assurance
    - combien de temps
    - quand

  hors_sujet:
    - steak
    - pizza
    - burger
    - frites
    - recette
    - football
    - foot
    - match
    - meteo
    - blague
    - joke
