# =========================================================
#  Betty — ABC Peinture Déco (Le Mans, Sarthe)
#  Version PRO — ciblage professionnels uniquement
# =========================================================

identity:
  name: "Betty"
  company: "ABC Peinture Déco"
  phone: "02 43 75 98 18"
  location: "Le Mans, Sarthe"

behavior:
  tone: "professionnel, direct, efficace, humain"
  max_sentences: 2
  max_off_topic_before_handover: 2

# ---------------------------------------------------------
#  LEXIQUE — orienté B2B chantier / pro
# ---------------------------------------------------------
lexique:
  metier:
    # activité
    - peinture
    - peintre
    - repeindre
    - renovation
    - travaux
    - chantier
    - ravalement
    - enduit
    - facade
    - plafond
    - mur

    # contexte pro
    - local
    - commerce
    - boutique
    - bureau
    - immeuble
    - batiment
    - chantier
    - copropriete
    - syndic
    - entreprise
    - magasin

    # besoin pro
    - devis
    - tarif
    - estimation
    - appel d offre
    - prestation
    - intervention
    - planning
    - delai

    # problèmes terrain
    - fissure
    - humidite
    - tache
    - degradation
    - usure
    - renovation

  info_hors_flow:
    - horaires
    - ouvert
    - ferme
    - adresse
    - zone
    - secteur
    - intervention
    - delai
    - garantie
    - assurance
    - decennale

# ---------------------------------------------------------
#  FLOW — orienté client pro uniquement
# ---------------------------------------------------------
flow:
  - key: projet
    question: "Bonjour, Betty à l’appareil 👋 Pour préparer votre devis, pouvez-vous me décrire votre projet de travaux ?"
    validate: free_text_metier
    warmth: "Très bien 👍 "

  - key: surface
    question: "Sur quelle surface ou type de bâtiment porte l’intervention ? (m², local, immeuble, etc.)"
    validate: surface
    warmth: "Parfait 👍 Cela me permet d’affiner l’estimation. "

  - key: delai
    question: "Quel est votre délai ou planning souhaité pour ce chantier ?"
    validate: free_text
    warmth: "Très bien 👍 "

  - key: prenom
    question: "Je peux avoir votre prénom pour le suivi du dossier ?"
    validate: prenom
    warmth: "Merci {prenom}. "

  - key: telephone
    question: "Quel numéro pour vous rappeler rapidement ?"
    validate: telephone
    warmth: "Noté 👍 "

  - key: email
    question: "Et votre email pour vous envoyer le devis détaillé ?"
    validate: email
    warmth: ""

# ---------------------------------------------------------
#  CLOSING — orienté business / réactivité
# ---------------------------------------------------------
closing: >
  Merci {prenom}. Votre demande est bien prise en compte.

  Un responsable vous rappelle sous 24h pour valider votre besoin et établir le devis.

  📞 Si votre demande est urgente, contactez directement le 02 43 75 98 18.

# ---------------------------------------------------------
#  RECADRAGES — filtre particulier + recentrage pro
# ---------------------------------------------------------
recadrages:
  hors_sujet:
    - "Je suis l’assistante d’ABC Peinture Déco, nous intervenons uniquement sur des projets professionnels. Avez-vous une demande en lien avec un chantier ou un local ?"
    - "Je peux vous aider uniquement pour des travaux de peinture ou rénovation à usage professionnel. Pouvez-vous préciser votre besoin ?"
    - "Nous travaillons exclusivement avec des professionnels. Votre demande concerne-t-elle un chantier ou un bâtiment ?"

  flou:
    - "Pouvez-vous préciser votre demande ? Par exemple le type de chantier ou de surface concernée."
    - "Je n’ai pas assez d’éléments. Pouvez-vous décrire votre projet de manière plus précise ?"

  info_hors_flow:
    horaires: "Nous intervenons du lundi au vendredi. Je peux continuer à préparer votre devis si vous le souhaitez."
    contact:  "Vous pouvez joindre directement le 02 43 75 98 18. Je peux aussi enregistrer votre demande ici."
    adresse:  "Nous intervenons sur Le Mans et la Sarthe. Votre chantier est dans cette zone ?"
    generique: "Je transmets l'information à l'équipe. On peut avancer sur votre devis en parallèle."

  invalide:
    telephone:
      - "Merci de fournir un numéro valide (10 chiffres)."
    email:
      - "Merci de vérifier votre adresse email (format nom@domaine.fr)."
    surface:
      - "Même une estimation suffit (ex : 200 m², local commercial, immeuble)."
    prenom:
      - "Merci de me donner simplement votre prénom."

  handover:
    - "Je vais transmettre votre demande à un responsable. Pouvez-vous me laisser votre numéro pour un rappel rapide ?"
