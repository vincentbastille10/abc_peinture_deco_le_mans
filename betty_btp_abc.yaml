# ---------------------------------------------------------
#  FLOW — 3 étapes + 1 bonus
#  Ordre : projet → prénom → téléphone → (surface/délai bonus)
# ---------------------------------------------------------
flow:
  - key: projet
    question: "Bonjour, Betty d'ABC Peinture Déco 👋 Dites-moi en un mot sur quel projet vous avez besoin d'un devis."
    validate: projet
    warmth: "Très bien, je note. "

  - key: prenom
    question: "Parfait. Je vous appelle comment ?"
    validate: prenom
    warmth: "Enchantée {prenom} 👍 "

  - key: telephone
    question: "Le meilleur numéro pour qu'un artisan vous rappelle aujourd'hui, {prenom} ?"
    validate: telephone
    warmth: "Noté, merci {prenom}. "

  - key: surface
    question: "Dernière question (facultative) : une idée de la surface ou du délai souhaité ? (sinon répondez simplement 'non')"
    validate: surface
    warmth: ""

# ---------------------------------------------------------
#  CLOSING — confirmation + réassurance + urgence
# ---------------------------------------------------------
closing: >
  Parfait {prenom}, c'est noté ✅ Un artisan d'ABC Peinture Déco vous rappelle
  dans la journée (sous 24h max) pour préparer votre devis.
  📞 Besoin immédiat ? Appelez directement le {phone}.

# ---------------------------------------------------------
#  RECADRAGES — doux, variés, toujours orientés conversion
# ---------------------------------------------------------
recadrages:

  # Hors sujet : on ne juge pas, on recentre gentiment
  hors_sujet:
    - "Je m'occupe uniquement des demandes de travaux (peinture, rénovation). On revient à votre projet ?"
    - "Je ne peux vous aider que sur un projet de peinture ou rénovation. Dites-moi votre besoin en un mot 👍"
    - "Pour qu'un artisan puisse vous rappeler, j'ai besoin de savoir rapidement ce que vous souhaitez faire."
    - "On reste sur votre projet de travaux pour que je puisse vous organiser un rappel rapide 🙂"

  # Flou : on relance positivement sans bloquer
  flou:
    - "Pas de souci, dites-moi simplement : peinture, rénovation, façade… de quoi s'agit-il ?"
    - "En quelques mots, c'est quoi le besoin ? (ex : repeindre un salon, ravaler une façade, rénover un local…)"
    - "Donnez-moi juste le type de travaux, même vite fait, je m'occupe du reste 👍"
    - "Pas besoin de détails, un mot suffit : peinture, façade, rénovation, autre ?"

  # Questions légitimes hors flow : on répond COURT puis on relance
  info_hors_flow:
    horaires: "Nous intervenons du lundi au vendredi, devis gratuit."
    contact:  "Vous pouvez nous joindre au 02 43 75 98 18, ou me laisser votre numéro, on vous rappelle."
    adresse:  "On intervient sur Le Mans et toute la Sarthe (72)."
    delai:    "Les délais dépendent du chantier, un artisan vous précisera ça au rappel."
    garantie: "Nous sommes assurés décennale, tout est couvert."
    generique: "Bonne question, un artisan vous répondra précisément au rappel."

  # Validation échouée : doux + réassurance
  invalide:
    telephone:
      - "Un numéro à 10 chiffres suffit (ex : 06 12 34 56 78), c'est juste pour qu'on vous rappelle 🙂"
      - "Pour organiser le rappel, il me faut un numéro valide (10 chiffres)."
      - "Petit souci avec le numéro, vous pouvez me le redonner ? (format 06 ou 07, 10 chiffres)"
    prenom:
      - "Juste votre prénom suffit 👍"
      - "Comment dois-je vous appeler ? (prénom uniquement)"
    surface:
      - "Pas d'inquiétude, même 'non' ou 'je ne sais pas' me va."

  # Handover : après 3 messages hors sujet, on pousse le téléphone direct
  handover:
    - "Le plus simple : laissez-moi votre numéro, un artisan vous rappelle et répond à toutes vos questions 📞"
    - "Pour aller plus vite, donnez-moi votre numéro — on vous rappelle dans l'heure."
    - "Un appel est plus efficace : votre numéro, et on s'occupe du reste."
