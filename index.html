<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABC Peinture Déco</title>
  <meta name="description" content="ABC Peinture Déco au Mans - peinture intérieure et extérieure.">
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: min(900px, 100%);
      text-align: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 20px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 0;
      line-height: 0;
    }

    .main-title {
      width: min(560px, 90%);
      height: auto;
      display: inline-block;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>
      <img src="static/ABC.png" alt="ABC Peinture Déco" class="main-title">
    </h1>
    <p>Entreprise de peinture au Mans.</p>
  </main>
</body>
</html>
